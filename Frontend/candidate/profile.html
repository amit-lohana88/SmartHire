<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | SmartHire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../css/style.css" rel="stylesheet"/>
  <link href="../css/candidate.css" rel="stylesheet"/>
</head>
<body>

  <div class="sidebar">
    <a class="navbar-brand" href="dashboard.html">
      <i class="bi bi-briefcase-fill me-2"></i>SmartHire
    </a>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a class="nav-link active" href="profile.html"><i class="bi bi-person-circle"></i> My Profile</a>
      <a class="nav-link" href="experience.html"><i class="bi bi-briefcase"></i> Experience</a>
      <a class="nav-link" href="education.html"><i class="bi bi-mortarboard"></i> Education</a>
      <a class="nav-link" href="skills.html"><i class="bi bi-stars"></i> Skills</a>
      <a class="nav-link" href="jobs.html"><i class="bi bi-search"></i> Browse Jobs</a>
      <a class="nav-link" href="saved-jobs.html"><i class="bi bi-bookmark-heart"></i> Saved Jobs</a>
      <a class="nav-link" href="applications.html"><i class="bi bi-file-earmark-text"></i> Applications</a>
      <hr style="border-color: rgba(255,255,255,0.2);"/>
      <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </nav>
  </div>

  <div class="main-content">

    <div id="error" class="alert alert-danger d-none"></div>
    <div id="success" class="alert alert-success d-none"></div>

    <!-- Profile Display Section -->
    <div id="profileDisplay" class="d-none">
      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start">
            <div class="d-flex align-items-center gap-4">
              <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                style="width: 80px; height: 80px; font-size: 2rem;">
                <i class="bi bi-person-fill"></i>
              </div>
              <div>
                <h4 class="fw-bold mb-1" id="displayName">-</h4>
                <p class="text-muted mb-1" id="displayHeadline">-</p>
                <p class="text-muted mb-0 small">
                  <i class="bi bi-geo-alt me-1"></i><span id="displayLocation">-</span>
                  &nbsp;|&nbsp;
                  <i class="bi bi-telephone me-1"></i><span id="displayPhone">-</span>
                </p>
              </div>
            </div>
            <button class="btn btn-outline-primary" id="editBtn">
              <i class="bi bi-pencil me-2"></i>Edit Profile
            </button>
          </div>
        </div>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-body p-4">
              <h6 class="fw-bold text-muted mb-3">EXPERIENCE</h6>
              <h3 class="fw-bold text-primary" id="displayExperience">-</h3>
              <p class="text-muted mb-0">Years of Experience</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-body p-4">
              <h6 class="fw-bold text-muted mb-3">RESUME</h6>
              <a id="displayResume" href="#" target="_blank" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-file-earmark-pdf me-2"></i>View Resume
              </a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-body p-4">
              <h6 class="fw-bold text-muted mb-3">LINKS</h6>
              <div class="d-flex gap-2 flex-wrap">
                <a id="displayLinkedin" href="#" target="_blank" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-linkedin"></i>
                </a>
                <a id="displayPortfolio" href="#" target="_blank" class="btn btn-sm btn-outline-secondary">
                  <i class="bi bi-globe"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <h6 class="fw-bold text-muted mb-3">ABOUT ME</h6>
          <p id="displayAbout" class="text-muted mb-0">-</p>
        </div>
      </div>
    </div>

    <!-- Create / Edit Form Section -->
    <div id="profileForm" class="">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">
          <i class="bi bi-person-circle me-2 text-primary"></i>
          <span id="formTitle">Complete Your Profile</span>
        </div>
        <div class="card-body p-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="full_name" class="form-control" placeholder="Ali Hassan"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Headline</label>
              <input type="text" id="headline" class="form-control" placeholder="Backend Developer"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" id="phone" class="form-control" placeholder="03001234567"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" id="location" class="form-control" placeholder="Karachi, Pakistan"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Total Experience (years)</label>
              <input type="number" id="total_experience_yrs" class="form-control" placeholder="2"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Profile Photo URL</label>
              <input type="text" id="profile_photo_url" class="form-control" placeholder="https://..."/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Resume URL</label>
              <input type="text" id="resume_url" class="form-control" placeholder="https://..."/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">LinkedIn URL</label>
              <input type="text" id="linkedin_url" class="form-control" placeholder="https://linkedin.com/in/..."/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Portfolio URL</label>
              <input type="text" id="portfolio_url" class="form-control" placeholder="https://..."/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">About Me</label>
              <textarea id="about_me" class="form-control" rows="4" placeholder="Tell employers about yourself..."></textarea>
            </div>
            <div class="col-12 d-flex gap-2">
              <button type="button" id="submitBtn" class="btn btn-primary px-4">
                <i class="bi bi-save me-2"></i>Save Profile
              </button>
              <button type="button" id="cancelBtn" class="btn btn-outline-secondary px-4 d-none">
                Cancel
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/candidate/profile.js"></script>
</body>
</html>
