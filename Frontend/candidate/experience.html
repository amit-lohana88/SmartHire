<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Experience | SmartHire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../css/style.css" rel="stylesheet"/>
</head>
<body>

  <div class="sidebar">
    <a class="navbar-brand" href="dashboard.html">
      <i class="bi bi-briefcase-fill me-2"></i>SmartHire
    </a>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i> My Profile</a>
      <a class="nav-link active" href="experience.html"><i class="bi bi-briefcase"></i> Experience</a>
      <a class="nav-link" href="education.html"><i class="bi bi-mortarboard"></i> Education</a>
      <a class="nav-link" href="skills.html"><i class="bi bi-stars"></i> Skills</a>
      <a class="nav-link" href="jobs.html"><i class="bi bi-search"></i> Browse Jobs</a>
      <a class="nav-link" href="saved-jobs.html"><i class="bi bi-bookmark-heart"></i> Saved Jobs</a>
      <a class="nav-link" href="applications.html"><i class="bi bi-file-earmark-text"></i> Applications</a>
      <hr style="border-color: rgba(255,255,255,0.2);"/>
      <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </nav>
  </div>

  <div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">Work Experience</h4>
        <p class="text-muted mb-0">Add and manage your work history</p>
      </div>
      <button class="btn btn-primary" id="showFormBtn">
        <i class="bi bi-plus-lg me-2"></i>Add Experience
      </button>
    </div>

    <div id="error" class="alert alert-danger d-none"></div>
    <div id="success" class="alert alert-success d-none"></div>

    <!-- Add / Edit Form -->
    <div class="card shadow-sm mb-4 d-none" id="experienceForm">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-briefcase me-2 text-primary"></i>
        <span id="formTitle">Add Experience</span>
      </div>
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label>
            <input type="text" id="job_title" class="form-control" placeholder="Backend Developer"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
            <input type="text" id="company_name" class="form-control" placeholder="Tech Corp"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Employment Type</label>
            <select id="employment_type" class="form-select">
              <option value="">Select type</option>
              <option value="full_time">Full Time</option>
              <option value="part_time">Part Time</option>
              <option value="internship">Internship</option>
              <option value="contract">Contract</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
            <input type="date" id="start_date" class="form-control"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">End Date</label>
            <input type="date" id="end_date" class="form-control"/>
          </div>
          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="is_current"/>
              <label class="form-check-label fw-semibold" for="is_current">
                Currently working here
              </label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea id="description" class="form-control" rows="3" placeholder="Describe your responsibilities..."></textarea>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary px-4" id="submitBtn">
              <i class="bi bi-save me-2"></i>Save
            </button>
            <button class="btn btn-outline-secondary px-4" id="cancelBtn">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Experience List -->
    <div id="experienceList"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/candidate/experience.js"></script>
</body>
</html>
