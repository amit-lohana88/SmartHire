<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skills | SmartHire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="../css/style.css" rel="stylesheet"/>
</head>
<body>

  <div class="sidebar">
    <a class="navbar-brand" href="dashboard.html">
      <i class="bi bi-briefcase-fill me-2"></i>SmartHire
    </a>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i> My Profile</a>
      <a class="nav-link" href="experience.html"><i class="bi bi-briefcase"></i> Experience</a>
      <a class="nav-link" href="education.html"><i class="bi bi-mortarboard"></i> Education</a>
      <a class="nav-link active" href="skills.html"><i class="bi bi-stars"></i> Skills</a>
      <a class="nav-link" href="jobs.html"><i class="bi bi-search"></i> Browse Jobs</a>
      <a class="nav-link" href="saved-jobs.html"><i class="bi bi-bookmark-heart"></i> Saved Jobs</a>
      <a class="nav-link" href="applications.html"><i class="bi bi-file-earmark-text"></i> Applications</a>
      <hr style="border-color: rgba(255,255,255,0.2);"/>
      <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </nav>
  </div>

  <div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">My Skills</h4>
        <p class="text-muted mb-0">Add skills to your profile</p>
      </div>
    </div>

    <div id="error" class="alert alert-danger d-none"></div>
    <div id="success" class="alert alert-success d-none"></div>

    <div class="row g-4">

      <!-- Add Skill Form -->
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white fw-semibold">
            <i class="bi bi-plus-circle me-2 text-primary"></i>Add a Skill
          </div>
          <div class="card-body p-4">

            <div class="mb-3">
              <label class="form-label fw-semibold">Search or Add Skill</label>
              <input type="text" id="skillSearch" class="form-control" placeholder="e.g. JavaScript"/>
              <div id="skillSuggestions" class="list-group mt-1"></div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Selected Skill</label>
              <input type="text" id="selectedSkillName" class="form-control" readonly placeholder="Select from suggestions"/>
              <input type="hidden" id="selectedSkillId"/>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Proficiency Level</label>
              <select id="proficiency_level" class="form-select">
                <option value="">Select level</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
                <option value="expert">Expert</option>
              </select>
            </div>

            <button class="btn btn-primary w-100" id="addSkillBtn">
              <i class="bi bi-plus-lg me-2"></i>Add Skill
            </button>

            <hr/>

            <p class="text-muted small fw-semibold mb-2">Can't find your skill?</p>
            <div class="input-group">
              <input type="text" id="newSkillName" class="form-control" placeholder="Add new skill"/>
              <button class="btn btn-outline-primary" id="createSkillBtn">Add</button>
            </div>
            <div class="mb-2">
              <label class="form-label fw-semibold small mt-2">Category</label>
              <input type="text" id="newSkillCategory" class="form-control" placeholder="e.g. Programming"/>
            </div>

          </div>
        </div>
      </div>

      <!-- My Skills List -->
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white fw-semibold">
            <i class="bi bi-stars me-2 text-primary"></i>My Skills
          </div>
          <div class="card-body p-4" id="mySkillsList">
            <div class="text-center text-muted py-4">
              <i class="bi bi-stars" style="font-size: 2.5rem;"></i>
              <p class="mt-3">No skills added yet.</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/candidate/skills.js"></script>
</body>
</html>
