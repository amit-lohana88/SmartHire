    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | SmartHire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-briefcase-fill me-2"></i>SmartHire
      </a>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="card shadow-sm w-100" style="max-width: 480px;">
      <div class="card-body p-5">

        <div class="text-center mb-4">
          <i class="bi bi-person-plus text-primary" style="font-size: 2.5rem;"></i>
          <h3 class="fw-bold mt-2">Create Account</h3>
          <p class="text-muted">Join SmartHire today</p>
        </div>

        <div id="error" class="alert alert-danger d-none"></div>
        <div id="success" class="alert alert-success d-none"></div>

        <form id="registerForm">

          <div class="mb-3">
            <label class="form-label fw-semibold">I am a</label>
            <div class="d-flex gap-3">
              <div class="form-check flex-fill border rounded p-3">
                <input class="form-check-input" type="radio" name="role" id="roleCandidate" value="candidate" checked/>
                <label class="form-check-label w-100" for="roleCandidate">
                  <i class="bi bi-person-fill text-primary me-2"></i>
                  <span class="fw-semibold">Candidate</span>
                  <div class="text-muted small">Looking for a job</div>
                </label>
              </div>
              <div class="form-check flex-fill border rounded p-3">
                <input class="form-check-input" type="radio" name="role" id="roleCompany" value="company"/>
                <label class="form-check-label w-100" for="roleCompany">
                  <i class="bi bi-building text-primary me-2"></i>
                  <span class="fw-semibold">Company</span>
                  <div class="text-muted small">Looking to hire</div>
                </label>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required/>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required/>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-person-check me-2"></i>Create Account
          </button>

        </form>

        <hr class="my-4"/>

        <p class="text-center text-muted mb-0">
          Already have an account?
          <a href="login.html" class="text-primary fw-semibold">Login here</a>
        </p>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
